build:
  gpu: true
  cuda: "12.4"
  python_version: "3.11"
  python_packages:
    - "torch==2.6.0"
    - "torchvision==0.21.0"
    - "yolov5==7.0.13"
    # yolov5 7.0.13 importa huggingface_hub.utils._errors que foi removido em hf>=0.26
    - "huggingface_hub>=0.20,<0.26"
    - "pillow>=10.0.0"
    - "numpy>=1.26.0"
    - "opencv-python-headless>=4.8.0"
    - "pandas>=2.0.0"
  system_packages:
    - libgl1
    - libglib2.0-0
  run:
    - command: python -c "import os; os.environ['HF_TOKEN']=open('/run/secrets/HF_TOKEN').read().strip(); from huggingface_hub import snapshot_download; snapshot_download(repo_id='Jonathancasjar/Retail_Shelves', local_dir='/src/weights/retail-shelves', token=os.environ['HF_TOKEN'])"
      mounts:
        - type: secret
          id: HF_TOKEN
          target: /run/secrets/HF_TOKEN

predict: "predict.py:Predictor"
